name = "client"
version = "1.0.0"
target = "javascript"

# Fill out these fields if you intend to generate HTML documentation or publish
# your project to the Hex package manager.
#
# description = ""
# licences = ["Apache-2.0"]
# repository = { type = "github", user = "", repo = "" }
# links = [{ title = "Website", href = "" }]
#
# For a full reference of all the available options, you can have a look at
# https://gleam.run/writing-gleam/gleam-toml/.

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
lustre = ">= 5.4.0 and < 6.0.0"
shared = { path = "../shared" }
rsvp = ">= 1.2.0 and < 2.0.0"
modem = ">= 2.1.2 and < 3.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
gleam_time = ">= 1.7.0 and < 2.0.0"
youid = ">= 1.5.1 and < 2.0.0"
g18n = { git = "https://github.com/m4reko/g18n", ref = "feat/cldr-custom-date-tokens" }
formal = ">= 3.0.1 and < 4.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
lustre_dev_tools = { git = "https://github.com/m4reko/lustre-dev-tools", ref = "main" }

[tools.lustre.html]
stylesheets = [
    { href = "https://cdn.jsdelivr.net/npm/@scouterna/ui-webc@4.3.4/dist/ui-webc/ui-webc.css" },
    { href = "https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap" },
]
scripts = [
    { src = "https://cdn.jsdelivr.net/npm/@scouterna/ui-webc@4.3.4/dist/esm/ui-webc.js", type = "module" },
]
link = [
    { href = "https://fonts.googleapis.com", rel = "preconnect" },
    { href = "https://fonts.gstatic.com", rel = "preconnect", crossorigin = "" },
]

[tools.lustre.build]
no_html = true

[tools.lustre.dev]
base_path = "/_services/booking"
proxy = { from = "/_services/booking/api", to = "http://localhost:8000/_services/booking/api" }
