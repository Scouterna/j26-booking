openapi: 3.0.3
info:
  title: J26 Booking API
  description: |
    REST API for the J26 Booking application. Provides endpoints for managing
    activities, bookings, and application configuration.
  version: 1.0.0
  contact:
    name: J26 Booking Team

servers:
  - url: /_services/booking/api
    description: API base path (under iframe base path)

tags:
  - name: Activities
    description: Manage booking activities
  - name: Bookings
    description: Manage bookings for activities
  - name: Favourites
    description: Manage the authenticated user's favourite activities
  - name: Configuration
    description: Application configuration
  - name: Locations
    description: Map locations and their tags

paths:
  /activities:
    get:
      tags:
        - Activities
      summary: List activities
      description: |
        Retrieve ordinary activities as slim summaries (without `description`),
        with optional sorting. Excludes recurring-kind slots (beach bus, climbing
        wall), which have their own endpoints. Not paginated. Requires
        authentication. Called-off activities are excluded by default, so the
        response is identical for every user; managers can pass
        `include_call_offs=true` to see them (used by the manage-activities
        view). Responses carry a strong `ETag`; send it as `If-None-Match` to
        get a `304 Not Modified` when nothing changed.
      operationId: listActivities
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/IncludeCallOffsParam'
        - $ref: '#/components/parameters/DayParam'
        - $ref: '#/components/parameters/IfNoneMatchParam'
      responses:
        '200':
          description: Successfully retrieved activities
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySummary'
                    example:
                      - id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                        title:
                          sv: "Lägereldssånger"
                          en: "Campfire Songs"
                        max_attendees: 50
                        start_time: 1752350400
                        end_time: 1752357600
                      - id: "b4219a53-4746-4a09-8b4e-3e2ac0c3df11"
                        title:
                          sv: "Orienteringsutmaning"
                          en: "Orienteering Challenge"
                        max_attendees: 30
                        start_time: 1752400800
                        end_time: 1752411600
        '304':
          $ref: '#/components/responses/NotModified'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Activities
      summary: Create activity
      description: Create a new activity with the provided details.
      operationId: createActivity
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        description: The activity to create.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityInput'
            example:
              title:
                sv: "Lägereldssånger"
                en: "Campfire Songs"
              description:
                sv: "En kväll med klassiska scoutsånger vid lägerelden med marshmallows."
                en: "An evening of classic scout songs around the campfire with marshmallows."
              max_attendees: 50
              start_time: 1752350400
              end_time: 1752357600
      responses:
        '201':
          description: Activity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title:
                  sv: "Lägereldssånger"
                  en: "Campfire Songs"
                description:
                  sv: "En kväll med klassiska scoutsånger vid lägerelden med marshmallows."
                  en: "An evening of classic scout songs around the campfire with marshmallows."
                max_attendees: 50
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /beach-bus-activities:
    get:
      tags:
        - Activities
      summary: List beach bus slots
      description: |
        Retrieve all beach bus (badbuss) slots as slim summaries (without
        `description`), ordered by start time. These are bookable slots of the
        recurring "beach-bus" kind. Not paginated. Requires authentication.
        Called-off slots are excluded by default (response identical for every
        user); managers can pass `include_call_offs=true` to see them. Responses
        carry a strong `ETag`; send it as `If-None-Match` to get a `304` when
        nothing changed.
      operationId: listBeachBusActivities
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/IncludeCallOffsParam'
        - $ref: '#/components/parameters/DayParam'
        - $ref: '#/components/parameters/IfNoneMatchParam'
      responses:
        '200':
          description: Successfully retrieved beach bus slots
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySummary'
                    example:
                      - id: "c1d2e3f4-0000-4000-8000-000000000001"
                        title:
                          sv: "Badbuss 09:00"
                          en: "Beach bus 09:00"
                        max_attendees: 40
                        start_time: 1752390000
                        end_time: 1752393600
        '304':
          $ref: '#/components/responses/NotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /climbing-wall-activities:
    get:
      tags:
        - Activities
      summary: List climbing wall slots
      description: |
        Retrieve all climbing wall (klättervägg) slots as slim summaries
        (without `description`), ordered by start time. These are bookable slots
        of the recurring "climbing-wall" kind. Not paginated. Requires
        authentication. Called-off slots are excluded by default (response
        identical for every user); managers can pass `include_call_offs=true` to
        see them. Responses carry a strong `ETag`; send it as `If-None-Match` to
        get a `304` when nothing changed.
      operationId: listClimbingWallActivities
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/IncludeCallOffsParam'
        - $ref: '#/components/parameters/DayParam'
        - $ref: '#/components/parameters/IfNoneMatchParam'
      responses:
        '200':
          description: Successfully retrieved climbing wall slots
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySummary'
                    example:
                      - id: "c1d2e3f4-0000-4000-8000-000000000002"
                        title:
                          sv: "Klättervägg 10:00"
                          en: "Climbing wall 10:00"
                        max_attendees: 12
                        start_time: 1752393600
                        end_time: 1752397200
        '304':
          $ref: '#/components/responses/NotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /beach-bus-bookings:
    get:
      tags:
        - Bookings
      summary: Beach bus booking overview
      description: |
        Aggregate booking overview for the beach bus (badbuss) slots of a single
        event day: each slot's schedule, capacity, total booked participants, and
        the per-kår breakdown. Restricted to one day via `day` (defaults to
        today, clamped into the event range). Called-off slots are excluded.
        Requires the `bookings.read` or `activities.manage` role. Responses carry
        a strong `ETag`; send it as `If-None-Match` to get a `304` when nothing
        changed.
      operationId: getBeachBusBookingOverview
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/DayParam'
        - $ref: '#/components/parameters/IfNoneMatchParam'
      responses:
        '200':
          description: Successfully retrieved the beach bus booking overview
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingOverview'
        '304':
          $ref: '#/components/responses/NotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /climbing-wall-bookings:
    get:
      tags:
        - Bookings
      summary: Climbing wall booking overview
      description: |
        Aggregate booking overview for the climbing wall (klättervägg) slots of a
        single event day: each slot's schedule, capacity, total booked
        participants, and the per-kår breakdown. Restricted to one day via `day`
        (defaults to today, clamped into the event range). Called-off slots are
        excluded. Requires the `bookings.read` or `activities.manage` role.
        Responses carry a strong `ETag`; send it as `If-None-Match` to get a
        `304` when nothing changed.
      operationId: getClimbingWallBookingOverview
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/DayParam'
        - $ref: '#/components/parameters/IfNoneMatchParam'
      responses:
        '200':
          description: Successfully retrieved the climbing wall booking overview
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingOverview'
        '304':
          $ref: '#/components/responses/NotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /favourited-activities:
    get:
      tags:
        - Favourites
      summary: List my favourited and booked activities
      description: |
        Retrieve the authenticated user's favourited and booked activities as
        slim summaries (without `description`), ordered by start time. Used to
        hydrate the client's activity cache with favourites the user may not
        have browsed to; Favourites tab membership is derived from
        `/statuses/me`, not from this list. Not paginated. Always includes
        called-off activities (this is where a user sees that something they
        booked or favourited was called off). Per-user, so its `ETag` differs
        between users; send it as `If-None-Match` to get a `304` when unchanged.
      operationId: listFavouritedActivities
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/IfNoneMatchParam'
      responses:
        '200':
          description: Successfully retrieved favourited and booked activities
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySummary'
                    example:
                      - id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                        title:
                          sv: "Lägereldssånger"
                          en: "Campfire Songs"
                        max_attendees: 50
                        start_time: 1752350400
                        end_time: 1752357600
        '304':
          $ref: '#/components/responses/NotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /activity-spots:
    get:
      tags:
        - Activities
      summary: List booked-spot counts
      description: |
        Retrieve the number of booked spots (summed `participant_count` over all
        bookings) for every activity, one entry per activity — including
        `spots_booked: 0` for activities with no bookings. This count is volatile
        and served separately from the (cacheable) activity read shapes so it can
        be fetched more often. Not user-specific; not paginated.
      operationId: listActivitySpots
      responses:
        '200':
          description: Successfully retrieved booked-spot counts
          content:
            application/json:
              schema:
                type: object
                required:
                  - spots
                properties:
                  spots:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySpots'
                    example:
                      - activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                        spots_booked: 12
                      - activity_id: "b4219a53-4746-4a09-8b4e-3e2ac0c3df11"
                        spots_booked: 0
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/spots:
    get:
      tags:
        - Activities
      summary: Get booked-spot count for activity
      description: |
        Retrieve the number of booked spots (summed `participant_count`) for a
        single activity. Returns `0` when the activity has no bookings.
      operationId: getActivitySpots
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '200':
          description: Successfully retrieved booked-spot count
          content:
            application/json:
              schema:
                type: object
                required:
                  - spots_booked
                properties:
                  spots_booked:
                    type: integer
                    minimum: 0
                    description: Summed participant_count of all bookings for the activity
                    example: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{id}:
    get:
      tags:
        - Activities
      summary: Get activity
      description: Retrieve a single activity by its ID.
      operationId: getActivity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Successfully retrieved activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title:
                  sv: "Lägereldssånger"
                  en: "Campfire Songs"
                description:
                  sv: "En kväll med klassiska scoutsånger vid lägerelden med marshmallows."
                  en: "An evening of classic scout songs around the campfire with marshmallows."
                max_attendees: 50
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      tags:
        - Activities
      summary: Update activity
      description: Update an existing activity with new details.
      operationId: updateActivity
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        description: The new activity details, replacing the existing activity.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityInput'
            example:
              title:
                sv: "Lägereldssånger (uppdaterad)"
                en: "Campfire Songs (Updated)"
              description:
                sv: "En kväll med klassiska scoutsånger med marshmallows och varm choklad."
                en: "An evening of classic scout songs with marshmallows and hot chocolate."
              max_attendees: 60
              start_time: 1752350400
              end_time: 1752357600
      responses:
        '200':
          description: Activity updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title:
                  sv: "Lägereldssånger (uppdaterad)"
                  en: "Campfire Songs (Updated)"
                description:
                  sv: "En kväll med klassiska scoutsånger med marshmallows och varm choklad."
                  en: "An evening of classic scout songs with marshmallows and hot chocolate."
                max_attendees: 60
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Activities
      summary: Delete activity
      description: Delete an activity by its ID.
      operationId: deleteActivity
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '204':
          description: Activity deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/bookings:
    get:
      tags:
        - Bookings
      summary: List bookings for activity
      description: >-
        Retrieve a paginated list of bookings for a specific activity, ordered
        by responsible name. Requires the `bookings:read` or `activities:manage`
        role.
      operationId: listBookingsByActivity
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successfully retrieved bookings
          content:
            application/json:
              schema:
                type: object
                required:
                  - bookings
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                    example:
                      - id: "dd000001-0000-4000-8000-000000000001"
                        user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                        activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                        booker_name: "Anna Svensson"
                        booker_group_id: 101
                        booker_group_name: "Sjöscoutkåren Dansen"
                        group_free_text: "Patrull Örnarna"
                        responsible_name: "Anna Svensson"
                        phone_number: "+46701234567"
                        participant_count: 12
                        booked_for_other: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Bookings
      summary: Create booking for activity
      description: |
        Create a new booking for a specific activity. The `user_id` and
        `booker_name` always come from the access token.

        Without `booker_group_id` in the body (the normal case) this books for
        the caller's own group: requires the `bookings:self:create` role, and
        `booker_group_id`/`booker_group_name` come from the token's scout
        group. Tokens without a scout group can still book — both are then
        `null`.

        With `booker_group_id` in the body the booking is made **on behalf of
        that kår** (info-tent flow): requires the `bookings:others:create`
        role, stores the requested kår as the booker group, and sets
        `booked_for_other` to `true` on the created booking. Valid ids are the
        ones served by `GET /scout-groups`.
      operationId: createBooking
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      requestBody:
        description: The booking details for the authenticated user.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
            example:
              group_free_text: "Patrol Eagles"
              responsible_name: "Anna Svensson"
              phone_number: "+46701234567"
              participant_count: 12
      responses:
        '201':
          description: Booking created successfully
          headers:
            Location:
              description: URL of the created booking
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_name: "Anna Svensson"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Örnarna"
                responsible_name: "Anna Svensson"
                phone_number: "+46701234567"
                participant_count: 12
                booked_for_other: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/CapacityExceeded'
        '500':
          $ref: '#/components/responses/ServerError'

  /bookings/{id}:
    get:
      tags:
        - Bookings
      summary: Get booking
      description: >-
        Retrieve a single booking by its ID. Requires the `bookings:read` or
        `activities:manage` role.
      operationId: getBooking
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Successfully retrieved booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_name: "Anna Svensson"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Örnarna"
                responsible_name: "Anna Svensson"
                phone_number: "+46701234567"
                participant_count: 12
                booked_for_other: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      tags:
        - Bookings
      summary: Update booking
      description: Update an existing booking. Only mutable fields (group_free_text, responsible_name, phone_number, participant_count) can be changed.
      operationId: updateBooking
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        description: The updated booking details (only mutable fields are applied).
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
            example:
              group_free_text: "Patrol Hawks"
              responsible_name: "Erik Johansson"
              phone_number: "+46709876543"
              participant_count: 15
      responses:
        '200':
          description: Booking updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_name: "Anna Svensson"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Falkarna"
                responsible_name: "Erik Johansson"
                phone_number: "+46709876543"
                participant_count: 15
                booked_for_other: false
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/CapacityExceeded'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Bookings
      summary: Delete booking
      description: Delete a booking by its ID.
      operationId: deleteBooking
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '204':
          description: Booking deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/favourite:
    put:
      tags:
        - Favourites
      summary: Favourite an activity
      description: |
        Mark an activity as favourited for the authenticated user. Idempotent — calling
        this on an already-favourited activity is a no-op success.
      operationId: putFavourite
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '200':
          description: Favourite created or already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favourite'
              example:
                id: "ff000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Favourites
      summary: Remove favourite
      description: |
        Un-favourite an activity. Returns 409 Conflict if the user has booked this
        activity — a booking implicitly favourites the activity, and the favourite
        cannot be removed while the booking exists.
      operationId: deleteFavourite
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '204':
          description: Favourite removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No favourite existed for this activity
        '409':
          description: Cannot unfavourite a booked activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Cannot unfavourite a booked activity"
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/cancel:
    post:
      tags:
        - Activities
      summary: Call off (cancel) an activity
      description: |
        Call off an activity with a reason ("ställ in"). The activity is kept in
        the database and stays visible to users who booked or favourited it (and
        to managers), with the reason shown; everyone else stops seeing it in
        the browse lists. New bookings are rejected once an activity is called
        off. Manager-only. Idempotent — calling this again updates the reason.
      operationId: cancelActivity
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      requestBody:
        description: The reason the activity is being called off.
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  description: Why the activity was called off, shown to booked/favourited users.
                  example: "Inställd på grund av väder"
            example:
              reason: "Inställd på grund av väder"
      responses:
        '200':
          description: Activity called off; the updated activity is returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title:
                  sv: "Lägereldssånger"
                  en: "Campfire Songs"
                description:
                  sv: "En kväll med klassiska scoutsånger vid lägerelden."
                  en: "An evening of classic scout songs around the campfire."
                max_attendees: 50
                start_time: 1752350400
                end_time: 1752357600
                cancellation: "Inställd på grund av väder"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: No activity with this id
        '500':
          $ref: '#/components/responses/ServerError'

  /me:
    get:
      tags:
        - Configuration
      summary: Get my identity and access roles
      description: |
        Retrieve the authenticated user's booker identity and access roles.
        `name` and `group_name` come from the token and are stored on any
        booking the user makes; the client shows them read-only in the booking
        form. `group_name` is `null` when the token carries no scout group.
        `roles` are the Keycloak role strings the client parses (from
        `resource_access.j26-booking.roles`); unknown roles the client does not
        model are ignored by the client.
      operationId: getMe
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Successfully retrieved the current user's identity and roles
          content:
            application/json:
              schema:
                type: object
                required:
                  - name
                  - group_name
                  - roles
                properties:
                  name:
                    type: string
                    description: The booker's name, from the token.
                    example: "Anna Andersson"
                  group_name:
                    type: string
                    nullable: true
                    description: >-
                      The booker's scout group (kår) display name, resolved from
                      the token's group id. `null` when the token carries no
                      scout group.
                    example: "Adolf Fredriks Scoutkår"
                  roles:
                    type: array
                    items:
                      type: string
                    example:
                      - "activities:manage"
        '401':
          $ref: '#/components/responses/Unauthorized'

  /scout-groups:
    get:
      tags:
        - Configuration
      summary: List registered scout groups (kårer)
      description: |
        Retrieve the full registered-kår list (kårnummer + display name) that
        drives the book-for-other kår picker. Requires the
        `bookings:others:create` role. The body is identical for every
        authorized caller and changes only on deploy, so responses carry a
        strong `ETag`; send it as `If-None-Match` to get a `304` when the list
        is unchanged.
      operationId: listScoutGroups
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Successfully retrieved the registered kår list
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                type: object
                required:
                  - scout_groups
                properties:
                  scout_groups:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScoutGroup'
                    example:
                      - id: 1102
                        name: "Adolf Fredriks Scoutkår"
                      - id: 1113
                        name: "Hedvig Eleonora Scoutkår"
        '304':
          $ref: '#/components/responses/NotModified'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /statuses/me:
