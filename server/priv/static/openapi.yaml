openapi: 3.0.3
info:
  title: J26 Booking API
  description: |
    REST API for the J26 Booking application. Provides endpoints for managing
    activities, bookings, and application configuration.
  version: 1.0.0
  contact:
    name: J26 Booking Team

servers:
  - url: /_services/booking/api
    description: API base path (under iframe base path)

tags:
  - name: Activities
    description: Manage booking activities
  - name: Bookings
    description: Manage bookings for activities
  - name: Favourites
    description: Manage the authenticated user's favourite activities
  - name: Configuration
    description: Application configuration

paths:
  /activities:
    get:
      tags:
        - Activities
      summary: List activities
      description: Retrieve a paginated list of activities with optional sorting.
      operationId: listActivities
      parameters:
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successfully retrieved activities
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/Activity'
              example:
                activities:
                  - id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                    title: "Campfire Songs"
                    description: "An evening of classic scout songs around the campfire with marshmallows."
                    max_attendees: 50
                    start_time: 1752350400
                    end_time: 1752357600
                  - id: "b4219a53-4746-4a09-8b4e-3e2ac0c3df11"
                    title: "Orienteering Challenge"
                    description: "Scouts navigate through the forest using only a compass and a map."
                    max_attendees: 30
                    start_time: 1752400800
                    end_time: 1752411600
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Activities
      summary: Create activity
      description: Create a new activity with the provided details.
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityInput'
            example:
              title: "Campfire Songs"
              description: "An evening of classic scout songs around the campfire with marshmallows."
              max_attendees: 50
              start_time: 1752350400
              end_time: 1752357600
      responses:
        '201':
          description: Activity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title: "Campfire Songs"
                description: "An evening of classic scout songs around the campfire with marshmallows."
                max_attendees: 50
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{id}:
    get:
      tags:
        - Activities
      summary: Get activity
      description: Retrieve a single activity by its ID.
      operationId: getActivity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Successfully retrieved activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title: "Campfire Songs"
                description: "An evening of classic scout songs around the campfire with marshmallows."
                max_attendees: 50
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      tags:
        - Activities
      summary: Update activity
      description: Update an existing activity with new details.
      operationId: updateActivity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityInput'
            example:
              title: "Campfire Songs (Updated)"
              description: "An evening of classic scout songs with marshmallows and hot chocolate."
              max_attendees: 60
              start_time: 1752350400
              end_time: 1752357600
      responses:
        '200':
          description: Activity updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title: "Campfire Songs (Updated)"
                description: "An evening of classic scout songs with marshmallows and hot chocolate."
                max_attendees: 60
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Activities
      summary: Delete activity
      description: Delete an activity by its ID.
      operationId: deleteActivity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '204':
          description: Activity deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/bookings:
    get:
      tags:
        - Bookings
      summary: List bookings for activity
      description: Retrieve a paginated list of bookings for a specific activity, ordered by responsible name.
      operationId: listBookingsByActivity
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successfully retrieved bookings
          content:
            application/json:
              schema:
                type: object
                required:
                  - bookings
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
              example:
                bookings:
                  - id: "dd000001-0000-4000-8000-000000000001"
                    user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                    activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                    booker_group_id: 101
                    booker_group_name: "Sjöscoutkåren Dansen"
                    group_free_text: "Patrull Örnarna"
                    responsible_name: "Anna Svensson"
                    phone_number: "+46701234567"
                    participant_count: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Bookings
      summary: Create booking for activity
      description: |
        Create a new booking for a specific activity. The `user_id`, `booker_group_id`,
        and `booker_group_name` are currently set to dummy values and will be populated
        from JWT authentication in the future.
      operationId: createBooking
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
            example:
              group_free_text: "Patrol Eagles"
              responsible_name: "Anna Svensson"
              phone_number: "+46701234567"
              participant_count: 12
      responses:
        '201':
          description: Booking created successfully
          headers:
            Location:
              description: URL of the created booking
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Örnarna"
                responsible_name: "Anna Svensson"
                phone_number: "+46701234567"
                participant_count: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /bookings/{id}:
    get:
      tags:
        - Bookings
      summary: Get booking
      description: Retrieve a single booking by its ID.
      operationId: getBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Successfully retrieved booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Örnarna"
                responsible_name: "Anna Svensson"
                phone_number: "+46701234567"
                participant_count: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      tags:
        - Bookings
      summary: Update booking
      description: Update an existing booking. Only mutable fields (group_free_text, responsible_name, phone_number, participant_count) can be changed.
      operationId: updateBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
            example:
              group_free_text: "Patrol Hawks"
              responsible_name: "Erik Johansson"
              phone_number: "+46709876543"
              participant_count: 15
      responses:
        '200':
          description: Booking updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Falkarna"
                responsible_name: "Erik Johansson"
                phone_number: "+46709876543"
                participant_count: 15
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Bookings
      summary: Delete booking
      description: Delete a booking by its ID.
      operationId: deleteBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '204':
          description: Booking deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/favourite:
    put:
      tags:
        - Favourites
      summary: Favourite an activity
      description: |
        Mark an activity as favourited for the authenticated user. Idempotent — calling
        this on an already-favourited activity is a no-op success.
      operationId: putFavourite
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '200':
          description: Favourite created or already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favourite'
              example:
                id: "ff000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthenticated
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Favourites
      summary: Remove favourite
      description: |
        Un-favourite an activity. Returns 409 Conflict if the user has booked this
        activity — a booking implicitly favourites the activity, and the favourite
        cannot be removed while the booking exists.
      operationId: deleteFavourite
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '204':
          description: Favourite removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthenticated
        '404':
          description: No favourite existed for this activity
        '409':
          description: Cannot unfavourite a booked activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: "Cannot unfavourite a booked activity"
        '500':
          $ref: '#/components/responses/ServerError'

  /favourites/me:
    get:
      tags:
        - Favourites
      summary: List my favourites
      description: Retrieve the authenticated user's favourite activities.
      operationId: listMyFavourites
      responses:
        '200':
          description: Successfully retrieved favourites
          content:
            application/json:
              schema:
                type: object
                required:
                  - favourites
                properties:
                  favourites:
                    type: array
                    items:
                      $ref: '#/components/schemas/Favourite'
              example:
                favourites:
                  - id: "ff000001-0000-4000-8000-000000000001"
                    user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                    activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        '401':
          description: Unauthenticated
        '500':
          $ref: '#/components/responses/ServerError'

  /app-config:
    get:
      tags:
        - Configuration
      summary: Get application configuration
      description: Retrieve the application navigation configuration.
      operationId: getAppConfig
      responses:
        '200':
          description: Successfully retrieved application configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfig'
              example:
                navigation:
                  - type: "group"
                    id: "group_booking"
                    label: "booking.schedule.label"
                    children:
                      - type: "page"
                        id: "page_all_activities"
                        label: "booking.all_activities.label"
                        icon: "campfire"
                        path: "../activities"
                      - type: "page"
                        id: "page_my_schedule"
                        label: "booking.my_schedule.label"
                        icon: "calendar-event"
                        path: "../"

components:
  schemas:
    Activity:
      type: object
      description: Represents a booking activity
      required:
        - id
        - title
        - description
        - start_time
        - end_time
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the activity
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        title:
          type: string
          description: Title of the activity
          example: "Campfire Songs"
        description:
          type: string
          description: Detailed description of the activity
          example: "An evening of classic scout songs around the campfire with marshmallows."
        max_attendees:
          type: integer
          nullable: true
          description: Maximum number of attendees (null for unlimited)
          example: 50
        start_time:
          type: integer
          format: int64
          description: Start time as Unix timestamp in seconds
          example: 1752350400
        end_time:
          type: integer
          format: int64
          description: End time as Unix timestamp in seconds
          example: 1752357600

    Booking:
      type: object
      description: Represents a booking for an activity
      required:
        - id
        - user_id
        - activity_id
        - booker_group_id
        - booker_group_name
        - group_free_text
        - responsible_name
        - phone_number
        - participant_count
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the booking
          example: "dd000001-0000-4000-8000-000000000001"
        user_id:
          type: string
          format: uuid
          description: ID of the user who created the booking
          example: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
        activity_id:
          type: string
          format: uuid
          description: ID of the activity being booked
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        booker_group_id:
          type: integer
          description: Booker's scout group ID (from Scoutnet via JWT, currently dummy value)
          example: 101
        booker_group_name:
          type: string
          description: Booker's scout group name (from Scoutnet via JWT, currently dummy value)
          example: "Sjöscoutkåren Dansen"
        group_free_text:
          type: string
          description: Free text for group/patrol identification
          example: "Patrull Örnarna"
        responsible_name:
          type: string
          description: Name of the responsible adult
          example: "Anna Svensson"
        phone_number:
          type: string
          description: Phone number of the responsible adult
          example: "+46701234567"
        participant_count:
          type: integer
          description: Number of participants
          example: 12

    Favourite:
      type: object
      description: Represents a favourite (interest) for an activity
      required:
        - id
        - user_id
        - activity_id
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the favourite
          example: "ff000001-0000-4000-8000-000000000001"
        user_id:
          type: string
          format: uuid
          description: ID of the user who favourited the activity
          example: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
        activity_id:
          type: string
          format: uuid
          description: ID of the favourited activity
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    BookingInput:
      type: object
      description: Input data for creating or updating a booking
      required:
        - group_free_text
        - responsible_name
        - phone_number
        - participant_count
      properties:
        group_free_text:
          type: string
          description: Free text for group/patrol identification
          example: "Patrull Örnarna"
        responsible_name:
          type: string
          description: Name of the responsible adult
          example: "Anna Svensson"
        phone_number:
          type: string
          description: Phone number of the responsible adult
          example: "+46701234567"
        participant_count:
          type: integer
          description: Number of participants
          example: 12

    ActivityInput:
      type: object
      description: Input data for creating or updating an activity
      required:
        - title
        - description
        - start_time
        - end_time
      properties:
        title:
          type: string
          description: Title of the activity
          example: "Campfire Songs"
        description:
          type: string
          description: Detailed description of the activity
          example: "An evening of classic scout songs around the campfire with marshmallows."
        max_attendees:
          type: integer
          nullable: true
          description: Maximum number of attendees (null or omit for unlimited)
          example: 50
        start_time:
          type: number
          description: Start time as Unix timestamp in seconds (accepts integer or float)
          example: 1752350400
        end_time:
          type: number
          description: End time as Unix timestamp in seconds (accepts integer or float)
          example: 1752357600

    AppConfig:
      type: object
      description: Application configuration including navigation structure
      required:
        - navigation
      properties:
        navigation:
          type: array
          description: Navigation menu structure
          items:
            $ref: '#/components/schemas/NavigationGroup'

    NavigationGroup:
      type: object
      description: A group of navigation items
      required:
        - type
        - id
        - label
        - children
      properties:
        type:
          type: string
          enum:
            - group
          description: Type identifier for navigation group
          example: "group"
        id:
          type: string
          description: Unique identifier for the group
          example: "group_booking"
        label:
          type: string
          description: Display label or i18n key for the group
          example: "booking.schedule.label"
        children:
          type: array
          description: Child navigation pages
          items:
            $ref: '#/components/schemas/NavigationPage'

    NavigationPage:
      type: object
      description: A navigation page link
      required:
        - type
        - id
        - label
        - icon
        - path
      properties:
        type:
          type: string
          enum:
            - page
          description: Type identifier for navigation page
          example: "page"
        id:
          type: string
          description: Unique identifier for the page
          example: "page_all_activities"
        label:
          type: string
          description: Display label or i18n key for the page
          example: "booking.all_activities.label"
        icon:
          type: string
          description: Icon name for the page entry
          example: "campfire"
        path:
          type: string
          description: URL path for the page (relative to the host application)
          example: "../activities"

  parameters:
    ActivityId:
      name: id
      in: path
      required: true
      description: Unique identifier of the activity
      schema:
        type: string
        format: uuid
      example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    ActivityIdPath:
      name: activity_id
      in: path
      required: true
      description: Unique identifier of the activity
      schema:
        type: string
        format: uuid
      example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    BookingId:
      name: id
      in: path
      required: true
      description: Unique identifier of the booking
      schema:
        type: string
        format: uuid
      example: "dd000001-0000-4000-8000-000000000001"

    SortParam:
      name: sort
      in: query
      required: false
      description: |
        Sort field for results. Always ascending.
        Available fields: title, start_time. Defaults to title.
      schema:
        type: string
        enum:
          - title
          - start_time
      example: "start_time"

    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination (0-indexed). Page size is 20.
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0

  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        text/plain:
          schema:
            type: string
          example: "Bad request: Invalid activity ID format"

    NotFound:
      description: Resource not found
      content:
        text/plain:
          schema:
            type: string
          example: "Not found"

    ServerError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string
          example: "Internal server error"
