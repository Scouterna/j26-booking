components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Keycloak access token for the `jamboree26` realm, sent explicitly by
        API clients.
    cookieAuth:
      type: apiKey
      in: cookie
      name: j26-auth_access-token
      description: |
        The httpOnly access-token cookie set by the j26-auth service. Browsers
        inside the j26-app shell send it automatically; the `Authorization`
        header takes precedence when both are present.
  schemas:
    Activity:
      type: object
      description: Represents a booking activity
      required:
        - id
        - title
        - description
        - start_time
        - end_time
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the activity
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        title:
          $ref: '#/components/schemas/BilingualString'
        description:
          $ref: '#/components/schemas/BilingualString'
        max_attendees:
          type: integer
          nullable: true
          description: Maximum number of attendees (null for unlimited)
          example: 50
        start_time:
          type: integer
          format: int64
          description: Start time as Unix timestamp in seconds
          example: 1752350400
        end_time:
          type: integer
          format: int64
          description: End time as Unix timestamp in seconds
          example: 1752357600
        location:
          type: object
          nullable: true
          description: The full location this activity happens at, embedded so no follow-up request is needed. Null if the activity has no location.
          allOf:
            - $ref: '#/components/schemas/Location'
          example:
            id: "0190f3a1-1c2d-7e3f-9a4b-5c6d7e8f9a0b"
            name:
              sv: "Infotält"
              en: "Info tent"
            description:
              sv: "Information och hjälp för deltagare."
              en: "Information and help for participants."
            icon_name: "tabler-badge-wc"
            icon_variant: "filled"
            color: "#2563eb"
            latitude: 55.979798511431689
            longitude: 14.134385999313892
            opening_hours: {}
            tags: []
        tags:
          type: array
          description: Ids of the activity tags applied to this activity (resolve them via `/activity-tags`).
          items:
            type: string
            format: uuid
          example: ["0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"]
        target_groups:
          type: array
          description: The scout age sections this activity targets.
          items:
            $ref: '#/components/schemas/TargetGroup'
          example: ["sparare", "upptackare"]
        cancellation:
          type: string
          nullable: true
          description: The reason the activity was called off, or null when it is active. A non-null value means the activity is cancelled ("inställd") and only booked/favourited users (and managers) see it.
          example: "Inställd på grund av väder"

    ActivitySummary:
      type: object
      description: Slim activity for list views (omits description)
      required:
        - id
        - title
        - start_time
        - end_time
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the activity
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        title:
          $ref: '#/components/schemas/BilingualString'
        max_attendees:
          type: integer
          nullable: true
          description: Maximum number of attendees (null for unlimited)
          example: 50
        start_time:
          type: integer
          format: int64
          description: Start time as Unix timestamp in seconds
          example: 1752350400
        end_time:
          type: integer
          format: int64
          description: End time as Unix timestamp in seconds
          example: 1752357600
        location_name:
          type: object
          nullable: true
          description: The location's name in both languages (null if the activity has no location). The client selects a variant by active language.
          allOf:
            - $ref: '#/components/schemas/BilingualString'
        tags:
          type: array
          description: Ids of the activity tags applied to this activity (resolve them via `/activity-tags`). Carried on the summary so list views can filter without fetching each activity's detail.
          items:
            type: string
            format: uuid
          example: ["0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"]
        target_groups:
          type: array
          description: The scout age sections this activity targets.
          items:
            $ref: '#/components/schemas/TargetGroup'
          example: ["sparare", "upptackare"]
        cancellation:
          type: string
          nullable: true
          description: The reason the activity was called off, or null when it is active. A non-null value means the activity is cancelled ("inställd") and only booked/favourited users (and managers) see it.
          example: "Inställd på grund av väder"

    TargetGroup:
      type: string
      description: A scout age section an activity can target ("målgrupp"). A fixed, closed set.
      enum:
        - sparare
        - upptackare
        - aventyrare
        - utmanare
        - rover
      example: "sparare"

    ActivityTag:
      type: object
      description: A tag that can be applied to activities. Unlike a location tag, it carries no icon.
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the tag
          example: "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"
        name:
          $ref: '#/components/schemas/BilingualString'

    ActivityTagInput:
      type: object
      description: Input data for creating or updating an activity tag
      required:
        - name
      properties:
        name:
          $ref: '#/components/schemas/BilingualString'

    ActivitySpots:
      type: object
      description: Booked-spot count for a single activity
      required:
        - activity_id
        - spots_booked
      properties:
        activity_id:
          type: string
          format: uuid
          description: Activity the count belongs to
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        spots_booked:
          type: integer
          minimum: 0
          description: Summed participant_count of all bookings for the activity
          example: 12

    ActivityStatusEntry:
      type: object
      description: |
        The authenticated user's status for one activity. `status` is either
        `booked` (with the embedded `booking`) or `favourited`.
      required:
        - activity_id
        - status
      properties:
        activity_id:
          type: string
          format: uuid
          description: ID of the activity this status refers to
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        status:
          type: string
          enum:
            - booked
            - favourited
          description: The user's relationship to the activity
          example: "booked"
        booking:
          allOf:
            - $ref: '#/components/schemas/Booking'
          description: The user's booking. Present only when status is `booked`.

    Booking:
      type: object
      description: Represents a booking for an activity
      required:
        - id
        - user_id
        - activity_id
        - booker_name
        - group_free_text
        - responsible_name
        - phone_number
        - participant_count
        - booked_for_other
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the booking
          example: "dd000001-0000-4000-8000-000000000001"
        user_id:
          type: string
          format: uuid
          description: ID of the user who created the booking
          example: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
        activity_id:
          type: string
          format: uuid
          description: ID of the activity being booked
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        booker_name:
          type: string
          description: Name of the booker, taken from the access token (JWT)
          example: "Anna Svensson"
        booker_group_id:
          type: integer
          nullable: true
          description: >-
            Booker's scout group ID (from Scoutnet via JWT). Null when the
            token has no scout group.
          example: 101
        booker_group_name:
          type: string
          nullable: true
          description: >-
            Booker's scout group name (from Scoutnet via JWT, currently a
            placeholder derived from the id). Null when the token has no scout
            group.
          example: "Sjöscoutkåren Dansen"
        group_free_text:
          type: string
          description: Free text for group/patrol identification
          example: "Patrull Örnarna"
        responsible_name:
          type: string
          description: Name of the responsible adult
          example: "Anna Svensson"
        phone_number:
          type: string
          description: Phone number of the responsible adult
          example: "+46701234567"
        participant_count:
          type: integer
          description: Number of participants
          example: 12
        booked_for_other:
          type: boolean
          description: >-
            True when the booking was made on behalf of another kår by a holder
            of `bookings:others:create` (the booker group is the kår booked
            for, not the booker's own).
          example: false

    GroupCount:
      type: object
      description: >-
        One scout corps' (kår) participant tally within a booking overview slot.
        `group_id`/`group_name` come from the booker's token; both are null for
        bookings made without a kår, which are bucketed under a single entry.
      required:
        - count
      properties:
        group_id:
          type: integer
          nullable: true
          description: Kår ID (Scoutnet). Null for bookings made without a kår.
          example: 101
        group_name:
          type: string
          nullable: true
          description: Kår name. Null for bookings made without a kår.
          example: "Sjöscoutkåren Dansen"
        count:
          type: integer
          description: Total participants booked by this group in the slot
          example: 8

    ScoutGroup:
      type: object
      description: >-
        One registered kår: its Scoutnet kårnummer (the id carried in tokens'
        `groups` claim and stored as `booker_group_id`) and display name.
      required:
        - id
        - name
      properties:
        id:
          type: integer
          description: Scoutnet kårnummer
          example: 1102
        name:
          type: string
          description: Kår display name
          example: "Adolf Fredriks Scoutkår"

    BookingSlot:
      type: object
      description: >-
        One recurring-activity slot in a booking overview: its schedule and
        capacity, total booked participants, and per-kår breakdown.
      required:
        - activity_id
        - start_time
        - end_time
        - total_booked
        - groups
      properties:
        activity_id:
          type: string
          format: uuid
          description: ID of the activity (slot); links to its full bookings view
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        start_time:
          type: integer
          description: Slot start time as a Unix timestamp (seconds)
          example: 1752390000
        end_time:
          type: integer
          description: Slot end time as a Unix timestamp (seconds)
          example: 1752391200
        max_attendees:
          type: integer
          nullable: true
          description: Capacity of the slot; null when uncapped
          example: 45
        total_booked:
          type: integer
          description: Sum of participants booked across all groups
          example: 43
        groups:
          type: array
          description: Per-kår participant breakdown (empty when nobody has booked)
          items:
            $ref: '#/components/schemas/GroupCount'

    BookingOverview:
      type: object
      description: Booking overview response — every slot of a recurring kind
      required:
        - slots
      properties:
        slots:
          type: array
          items:
            $ref: '#/components/schemas/BookingSlot'
          example:
            - activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
              start_time: 1752390000
              end_time: 1752391200
              max_attendees: 45
              total_booked: 43
              groups:
                - group_id: 1
                  group_name: "Abbekås"
                  count: 3
                - group_id: 3
                  group_name: "Ölagets Scoutkår"
                  count: 40

    Favourite:
      type: object
      description: Represents a favourite (interest) for an activity
      required:
        - id
        - user_id
        - activity_id
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the favourite
          example: "ff000001-0000-4000-8000-000000000001"
        user_id:
          type: string
          format: uuid
          description: ID of the user who favourited the activity
          example: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
        activity_id:
          type: string
          format: uuid
          description: ID of the favourited activity
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    BilingualString:
      type: object
      description: A string in both Swedish and English; the client selects a variant by active language.
      required:
        - sv
        - en
      properties:
        sv:
          type: string
          description: Swedish text
          example: "Infotält"
        en:
          type: string
          description: English text
          example: "Info tent"

    Location:
      type: object
      description: A map location with its tags and opening hours
      required:
        - id
        - name
        - description
        - icon_name
        - icon_variant
        - color
        - latitude
        - longitude
        - opening_hours
        - tags
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the location
          example: "0190f3a1-1c2d-7e3f-9a4b-5c6d7e8f9a0b"
        name:
          $ref: '#/components/schemas/BilingualString'
        description:
          $ref: '#/components/schemas/BilingualString'
        icon_name:
          type: string
          description: Name of the icon representing the location
          example: "tabler-badge-wc"
        icon_variant:
          type: string
          description: Icon style variant, e.g. "outline" or "filled"
          example: "outline"
        color:
          type: string
          description: Hex colour used for the location marker
          example: "#2563eb"
        latitude:
          type: number
          format: double
          description: Latitude in decimal degrees
          example: 55.979798511431689
        longitude:
          type: number
          format: double
          description: Longitude in decimal degrees
          example: 14.134385999313892
        opening_hours:
          $ref: '#/components/schemas/OpeningHours'
        tags:
          type: array
          description: Ids of the tags applied to this location
          items:
            type: string
            format: uuid
          example:
            - "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"

    OpeningHours:
      type: object
      description: |
        Opening hours keyed by ISO date (`YYYY-MM-DD`). Each date maps to the
        intervals the location is open that day; a missing date means closed.
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/TimeRange'
      example:
        "2026-07-25":
          - from: "09:00"
            to: "12:00"
          - from: "13:00"
            to: "18:00"

    TimeRange:
      type: object
      description: A single open interval within a day (HH:MM)
      required:
        - from
        - to
      properties:
        from:
          type: string
          description: Opening time (HH:MM)
          example: "09:00"
        to:
          type: string
          description: Closing time (HH:MM)
          example: "12:00"

    LocationTag:
      type: object
      description: A tag that can be applied to locations
      required:
        - id
        - name
        - icon_name
        - icon_variant
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the tag
          example: "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"
        name:
          $ref: '#/components/schemas/BilingualString'
        icon_name:
          type: string
          description: Name of the icon representing the tag
          example: "tabler-info-circle"
        icon_variant:
          type: string
          description: Icon style variant, e.g. "outline" or "filled"
          example: "outline"

    LocationInput:
      type: object
      description: Input for creating or updating a location
      required:
        - name
        - description
        - icon_name
        - icon_variant
        - color
        - latitude
        - longitude
      properties:
        name:
          $ref: '#/components/schemas/BilingualString'
        description:
          $ref: '#/components/schemas/BilingualString'
        icon_name:
          type: string
          example: "tabler-badge-wc"
        icon_variant:
          type: string
          example: "filled"
        color:
          type: string
          example: "#2563eb"
        latitude:
          type: number
          format: double
          example: 55.979798511431689
        longitude:
          type: number
          format: double
          example: 14.134385999313892
        opening_hours:
          $ref: '#/components/schemas/OpeningHours'
        tags:
          type: array
          description: Ids of the tags to link to this location (default empty)
          items:
            type: string
            format: uuid
          example:
            - "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"

    LocationTagInput:
      type: object
      description: Input for creating or updating a location tag
      required:
        - name
        - icon_name
        - icon_variant
      properties:
        name:
          $ref: '#/components/schemas/BilingualString'
        icon_name:
          type: string
          example: "tabler-info-circle"
        icon_variant:
          type: string
          example: "outline"

    BookingInput:
      type: object
      description: Input data for creating or updating a booking
      required:
        - group_free_text
        - responsible_name
        - phone_number
        - participant_count
      properties:
        group_free_text:
          type: string
          description: Free text for group/patrol identification
          example: "Patrull Örnarna"
        responsible_name:
          type: string
          description: Name of the responsible adult
          example: "Anna Svensson"
        phone_number:
          type: string
          description: Phone number of the responsible adult
          example: "+46701234567"
        participant_count:
          type: integer
          description: Number of participants
          example: 12
        booker_group_id:
          type: integer
          description: >-
            The kår to book on behalf of (a kårnummer from `GET
            /scout-groups`). Only honoured on create, where its presence makes
            the request a book-for-other booking requiring the
            `bookings:others:create` role; omit to book for the caller's own
            token group. Ignored on update (the booked-for kår is immutable).
          example: 1102

    ActivityInput:
      type: object
      description: Input data for creating or updating an activity
      required:
        - title
        - description
        - start_time
        - end_time
      properties:
        title:
          $ref: '#/components/schemas/BilingualString'
        description:
          $ref: '#/components/schemas/BilingualString'
        max_attendees:
          type: integer
          nullable: true
          description: Maximum number of attendees (null or omit for unlimited)
          example: 50
        start_time:
          type: number
          description: Start time as Unix timestamp in seconds (accepts integer or float)
          example: 1752350400
        end_time:
          type: number
          description: End time as Unix timestamp in seconds (accepts integer or float)
          example: 1752357600
        tags:
          type: array
          description: Ids of the activity tags to apply (re-synced to exactly this set). Omit or empty to clear.
          items:
            type: string
            format: uuid
          example: ["0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"]
        target_groups:
          type: array
          description: The scout age sections this activity targets (re-synced to exactly this set). Omit or empty to clear.
          items:
            $ref: '#/components/schemas/TargetGroup'
          example: ["sparare", "upptackare"]
        location_id:
          type: string
          format: uuid
          nullable: true
          description: Id of an existing location to hold this activity at. Null or omit for no location.
          example: "0190f3a1-1c2d-7e3f-9a4b-5c6d7e8f9a0b"

    AppConfig:
      type: object
      description: Application configuration including navigation structure
      required:
        - navigation
      properties:
        navigation:
          type: array
          description: Navigation menu structure
          items:
            $ref: '#/components/schemas/NavigationGroup'
          example:
            - type: "group"
              id: "group_booking"
              label: "booking.schedule.label"
              children:
                - type: "page"
                  id: "page_all_activities"
                  label: "booking.all_activities.label"
                  icon: "campfire"
                  path: "../activities"

    NavigationGroup:
      type: object
      description: A group of navigation items
      required:
        - type
        - id
        - label
        - children
      properties:
        type:
          type: string
          enum:
            - group
          description: Type identifier for navigation group
          example: "group"
        id:
          type: string
          description: Unique identifier for the group
          example: "group_booking"
        label:
          type: string
          description: Display label or i18n key for the group
          example: "booking.schedule.label"
        children:
          type: array
          description: Child navigation pages
          items:
            $ref: '#/components/schemas/NavigationPage'

    NavigationPage:
      type: object
      description: A navigation page link
      required:
        - type
        - id
        - label
        - icon
        - path
      properties:
        type:
          type: string
          enum:
            - page
          description: Type identifier for navigation page
          example: "page"
        id:
          type: string
          description: Unique identifier for the page
          example: "page_all_activities"
        label:
          type: string
          description: Display label or i18n key for the page
          example: "booking.all_activities.label"
        icon:
          type: string
          description: Icon name for the page entry
          example: "campfire"
        path:
          type: string
          description: URL path for the page (relative to the host application)
          example: "../activities"

  parameters:
    ActivityId:
      name: id
      in: path
      required: true
      description: Unique identifier of the activity
      schema:
        type: string
        format: uuid
      example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    ActivityIdPath:
      name: activity_id
      in: path
      required: true
      description: Unique identifier of the activity
      schema:
        type: string
        format: uuid
      example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    ActivityTagIdPath:
      name: id
      in: path
      required: true
      description: Unique identifier of the activity tag
      schema:
        type: string
        format: uuid
      example: "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"

    BookingId:
      name: id
      in: path
      required: true
      description: Unique identifier of the booking
      schema:
        type: string
        format: uuid
      example: "dd000001-0000-4000-8000-000000000001"

    LocationIdPath:
      name: id
      in: path
      required: true
      description: Unique identifier of the location
      schema:
        type: string
        format: uuid
      example: "0190f3a1-1c2d-7e3f-9a4b-5c6d7e8f9a0b"

    LocationTagIdPath:
      name: id
      in: path
      required: true
      description: Unique identifier of the location tag
      schema:
        type: string
        format: uuid
      example: "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"

    SortParam:
      name: sort
      in: query
      required: false
      description: |
        Sort field for results. Always ascending.
        Available fields: title, start_time. Defaults to title.
      schema:
        type: string
        enum:
          - title
          - start_time
      example: "start_time"

    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination (0-indexed). Page size is 20.
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0

    IncludeCallOffsParam:
      name: include_call_offs
      in: query
      required: false
      description: |
        Include called-off activities in the list. Manager-only: requesting
        `true` without the `activities:manage` role returns `403`. Defaults to
        `false`, which excludes called-off activities so the response is
        identical for every user (used by the manage-activities view). The
        favourited-activities endpoint always includes call-offs and ignores
        this parameter.
      schema:
        type: boolean
        default: false
      example: true

    DayParam:
      name: day
      in: query
      required: false
      description: |
        Restrict the list to a single event day (`YYYY-MM-DD`). Only the fixed
        event dates `2026-07-25`–`2026-08-01` are meaningful; a valid date
        outside that range is clamped into it. Omitted defaults to today clamped
        into the event range. A malformed value returns `400`. The
        favourited-activities endpoint ignores this parameter (it always spans
        all days).
      schema:
        type: string
        format: date
      example: '2026-07-26'

    IfNoneMatchParam:
      name: If-None-Match
      in: header
      required: false
      description: |
        The `ETag` from a previous response for this resource. If it still
        matches, the server responds `304 Not Modified` with no body so the
        client can reuse its cached copy.
      schema:
        type: string
      example: '"a1b2c3"'

  headers:
    ETag:
      description: |
        Strong validator (SHA-256 of the response body). Send it back as
        `If-None-Match` on the next request to revalidate.
      schema:
        type: string
      example: '"a1b2c3"'

  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        text/plain:
          schema:
            type: string
          example: "Bad request: Invalid activity ID format"

    NotFound:
      description: Resource not found
      content:
        text/plain:
          schema:
            type: string
          example: "Not found"

    ServerError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string
          example: "Internal server error"

    Unauthorized:
      description: Unauthenticated - missing or invalid access token

    NotModified:
      description: |
        The client's `If-None-Match` matches the current `ETag`; the resource is
        unchanged. No body is returned — reuse the cached copy.
      headers:
        ETag:
          $ref: '#/components/headers/ETag'

    Forbidden:
      description: Forbidden - the authenticated user lacks the required role

    CapacityExceeded:
      description: >-
        The booking would push the activity past its `max_attendees` cap. The
        body reports the cap and the count already booked so the client can
        refresh its view.
      content:
        application/json:
          schema:
            type: object
            required: [error, max_attendees, spots_booked]
            properties:
              error:
                type: string
                enum: [capacity_exceeded]
                example: "capacity_exceeded"
              max_attendees:
                type: integer
                description: The activity's attendee cap.
                example: 20
              spots_booked:
                type: integer
                description: Spots already booked at the time of the check.
                example: 18
          example:
            error: "capacity_exceeded"
            max_attendees: 20
            spots_booked: 18
