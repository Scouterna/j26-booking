openapi: 3.0.3
info:
  title: J26 Booking API
  description: |
    REST API for the J26 Booking application. Provides endpoints for managing
    activities, bookings, and application configuration.
  version: 1.0.0
  contact:
    name: J26 Booking Team

servers:
  - url: /_services/booking/api
    description: API base path (under iframe base path)

tags:
  - name: Activities
    description: Manage booking activities
  - name: Bookings
    description: Manage bookings for activities
  - name: Favourites
    description: Manage the authenticated user's favourite activities
  - name: Configuration
    description: Application configuration
  - name: Locations
    description: Map locations and their tags

paths:
  /activities:
    get:
      tags:
        - Activities
      summary: List activities
      description: |
        Retrieve ordinary activities as slim summaries (without `description`),
        with optional sorting. Excludes recurring-kind slots (swim bus, climbing
        wall), which have their own endpoints. Not paginated.
      operationId: listActivities
      parameters:
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Successfully retrieved activities
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySummary'
              example:
                activities:
                  - id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                    title: "Campfire Songs"
                    max_attendees: 50
                    start_time: 1752350400
                    end_time: 1752357600
                  - id: "b4219a53-4746-4a09-8b4e-3e2ac0c3df11"
                    title: "Orienteering Challenge"
                    max_attendees: 30
                    start_time: 1752400800
                    end_time: 1752411600
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Activities
      summary: Create activity
      description: Create a new activity with the provided details.
      operationId: createActivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityInput'
            example:
              title: "Campfire Songs"
              description: "An evening of classic scout songs around the campfire with marshmallows."
              max_attendees: 50
              start_time: 1752350400
              end_time: 1752357600
      responses:
        '201':
          description: Activity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title: "Campfire Songs"
                description: "An evening of classic scout songs around the campfire with marshmallows."
                max_attendees: 50
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /swim-bus-activities:
    get:
      tags:
        - Activities
      summary: List swim bus slots
      description: |
        Retrieve all swim bus (badbuss) slots as slim summaries (without
        `description`), ordered by start time. These are bookable slots of the
        recurring "swim-bus" kind. Not paginated.
      operationId: listSwimBusActivities
      responses:
        '200':
          description: Successfully retrieved swim bus slots
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySummary'
        '500':
          $ref: '#/components/responses/ServerError'

  /climbing-wall-activities:
    get:
      tags:
        - Activities
      summary: List climbing wall slots
      description: |
        Retrieve all climbing wall (klättervägg) slots as slim summaries
        (without `description`), ordered by start time. These are bookable slots
        of the recurring "climbing-wall" kind. Not paginated.
      operationId: listClimbingWallActivities
      responses:
        '200':
          description: Successfully retrieved climbing wall slots
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySummary'
        '500':
          $ref: '#/components/responses/ServerError'

  /favourited-activities:
    get:
      tags:
        - Favourites
      summary: List my favourited and booked activities
      description: |
        Retrieve the authenticated user's favourited and booked activities as
        slim summaries (without `description`), ordered by start time. Used to
        hydrate the client's activity cache with favourites the user may not
        have browsed to; Favourites tab membership is derived from
        `/statuses/me`, not from this list. Not paginated.
      operationId: listFavouritedActivities
      responses:
        '200':
          description: Successfully retrieved favourited and booked activities
          content:
            application/json:
              schema:
                type: object
                required:
                  - activities
                properties:
                  activities:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySummary'
        '401':
          description: Unauthenticated
        '500':
          $ref: '#/components/responses/ServerError'

  /activity-spots:
    get:
      tags:
        - Activities
      summary: List booked-spot counts
      description: |
        Retrieve the number of booked spots (summed `participant_count` over all
        bookings) for every activity, one entry per activity — including
        `spots_booked: 0` for activities with no bookings. This count is volatile
        and served separately from the (cacheable) activity read shapes so it can
        be fetched more often. Not user-specific; not paginated.
      operationId: listActivitySpots
      responses:
        '200':
          description: Successfully retrieved booked-spot counts
          content:
            application/json:
              schema:
                type: object
                required:
                  - spots
                properties:
                  spots:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivitySpots'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/spots:
    get:
      tags:
        - Activities
      summary: Get booked-spot count for activity
      description: |
        Retrieve the number of booked spots (summed `participant_count`) for a
        single activity. Returns `0` when the activity has no bookings.
      operationId: getActivitySpots
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '200':
          description: Successfully retrieved booked-spot count
          content:
            application/json:
              schema:
                type: object
                required:
                  - spots_booked
                properties:
                  spots_booked:
                    type: integer
                    minimum: 0
                    description: Summed participant_count of all bookings for the activity
                    example: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{id}:
    get:
      tags:
        - Activities
      summary: Get activity
      description: Retrieve a single activity by its ID.
      operationId: getActivity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '200':
          description: Successfully retrieved activity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title: "Campfire Songs"
                description: "An evening of classic scout songs around the campfire with marshmallows."
                max_attendees: 50
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      tags:
        - Activities
      summary: Update activity
      description: Update an existing activity with new details.
      operationId: updateActivity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ActivityInput'
            example:
              title: "Campfire Songs (Updated)"
              description: "An evening of classic scout songs with marshmallows and hot chocolate."
              max_attendees: 60
              start_time: 1752350400
              end_time: 1752357600
      responses:
        '200':
          description: Activity updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Activity'
              example:
                id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                title: "Campfire Songs (Updated)"
                description: "An evening of classic scout songs with marshmallows and hot chocolate."
                max_attendees: 60
                start_time: 1752350400
                end_time: 1752357600
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Activities
      summary: Delete activity
      description: Delete an activity by its ID.
      operationId: deleteActivity
      parameters:
        - $ref: '#/components/parameters/ActivityId'
      responses:
        '204':
          description: Activity deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/bookings:
    get:
      tags:
        - Bookings
      summary: List bookings for activity
      description: Retrieve a paginated list of bookings for a specific activity, ordered by responsible name.
      operationId: listBookingsByActivity
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
        - $ref: '#/components/parameters/PageParam'
      responses:
        '200':
          description: Successfully retrieved bookings
          content:
            application/json:
              schema:
                type: object
                required:
                  - bookings
                properties:
                  bookings:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
              example:
                bookings:
                  - id: "dd000001-0000-4000-8000-000000000001"
                    user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                    activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                    booker_group_id: 101
                    booker_group_name: "Sjöscoutkåren Dansen"
                    group_free_text: "Patrull Örnarna"
                    responsible_name: "Anna Svensson"
                    phone_number: "+46701234567"
                    participant_count: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

    post:
      tags:
        - Bookings
      summary: Create booking for activity
      description: |
        Create a new booking for a specific activity. The `user_id`, `booker_group_id`,
        and `booker_group_name` are currently set to dummy values and will be populated
        from JWT authentication in the future.
      operationId: createBooking
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
            example:
              group_free_text: "Patrol Eagles"
              responsible_name: "Anna Svensson"
              phone_number: "+46701234567"
              participant_count: 12
      responses:
        '201':
          description: Booking created successfully
          headers:
            Location:
              description: URL of the created booking
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Örnarna"
                responsible_name: "Anna Svensson"
                phone_number: "+46701234567"
                participant_count: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /bookings/{id}:
    get:
      tags:
        - Bookings
      summary: Get booking
      description: Retrieve a single booking by its ID.
      operationId: getBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Successfully retrieved booking
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Örnarna"
                responsible_name: "Anna Svensson"
                phone_number: "+46701234567"
                participant_count: 12
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    put:
      tags:
        - Bookings
      summary: Update booking
      description: Update an existing booking. Only mutable fields (group_free_text, responsible_name, phone_number, participant_count) can be changed.
      operationId: updateBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingInput'
            example:
              group_free_text: "Patrol Hawks"
              responsible_name: "Erik Johansson"
              phone_number: "+46709876543"
              participant_count: 15
      responses:
        '200':
          description: Booking updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Booking'
              example:
                id: "dd000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                booker_group_id: 101
                booker_group_name: "Sjöscoutkåren Dansen"
                group_free_text: "Patrull Falkarna"
                responsible_name: "Erik Johansson"
                phone_number: "+46709876543"
                participant_count: 15
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Bookings
      summary: Delete booking
      description: Delete a booking by its ID.
      operationId: deleteBooking
      parameters:
        - $ref: '#/components/parameters/BookingId'
      responses:
        '204':
          description: Booking deleted successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /activities/{activity_id}/favourite:
    put:
      tags:
        - Favourites
      summary: Favourite an activity
      description: |
        Mark an activity as favourited for the authenticated user. Idempotent — calling
        this on an already-favourited activity is a no-op success.
      operationId: putFavourite
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '200':
          description: Favourite created or already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Favourite'
              example:
                id: "ff000001-0000-4000-8000-000000000001"
                user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthenticated
        '500':
          $ref: '#/components/responses/ServerError'

    delete:
      tags:
        - Favourites
      summary: Remove favourite
      description: |
        Un-favourite an activity. Returns 409 Conflict if the user has booked this
        activity — a booking implicitly favourites the activity, and the favourite
        cannot be removed while the booking exists.
      operationId: deleteFavourite
      parameters:
        - $ref: '#/components/parameters/ActivityIdPath'
      responses:
        '204':
          description: Favourite removed
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Unauthenticated
        '404':
          description: No favourite existed for this activity
        '409':
          description: Cannot unfavourite a booked activity
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: "Cannot unfavourite a booked activity"
        '500':
          $ref: '#/components/responses/ServerError'

  /statuses/me:
    get:
      tags:
        - Favourites
      summary: List my activity statuses
      description: |
        Retrieve the authenticated user's bookings and favourites merged into a
        single sparse list. Only activities the user has booked or favourited
        are returned; `booked` dominates `favourited`, so an activity that is
        both appears once with status `booked`. Activities absent from the list
        have no status for the user.
      operationId: listMyStatuses
      responses:
        '200':
          description: Successfully retrieved statuses
          content:
            application/json:
              schema:
                type: object
                required:
                  - statuses
                properties:
                  statuses:
                    type: array
                    items:
                      $ref: '#/components/schemas/ActivityStatusEntry'
              example:
                statuses:
                  - activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                    status: "booked"
                    booking:
                      id: "aa000001-0000-4000-8000-000000000001"
                      user_id: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
                      activity_id: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
                      booker_group_id: 0
                      booker_group_name: "Patrull Räven"
                      group_free_text: "Vi är glada!"
                      responsible_name: "Anna Svensson"
                      phone_number: "+46701234567"
                      participant_count: 5
                  - activity_id: "b4219a53-4746-4a09-8b4e-3e2ac0c3df11"
                    status: "favourited"
        '401':
          description: Unauthenticated
        '500':
          $ref: '#/components/responses/ServerError'

  /app-config:
    get:
      tags:
        - Configuration
      summary: Get application configuration
      description: Retrieve the application navigation configuration.
      operationId: getAppConfig
      responses:
        '200':
          description: Successfully retrieved application configuration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppConfig'
              example:
                navigation:
                  - type: "group"
                    id: "group_booking"
                    label: "booking.schedule.label"
                    children:
                      - type: "page"
                        id: "page_all_activities"
                        label: "booking.all_activities.label"
                        icon: "campfire"
                        path: "../activities"
                      - type: "page"
                        id: "page_my_schedule"
                        label: "booking.my_schedule.label"
                        icon: "calendar-event"
                        path: "../"

  /locations:
    get:
      tags:
        - Locations
      summary: List locations
      description: |
        Retrieve all map locations, ordered by name. Each location embeds the
        ids of its tags (resolve them via `/location-tags`) and its opening
        hours keyed by ISO date. Not paginated.
      operationId: listLocations
      responses:
        '200':
          description: Successfully retrieved locations
          content:
            application/json:
              schema:
                type: object
                required:
                  - locations
                properties:
                  locations:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
              example:
                locations:
                  - id: "0190f3a1-1c2d-7e3f-9a4b-5c6d7e8f9a0b"
                    name: "Infotält"
                    name_en: "Info tent"
                    description: "Information och hjälp för deltagare."
                    description_en: "Information and help for participants."
                    icon_name: "tabler-badge-wc"
                    icon_variant: "filled"
                    color: "#2563eb"
                    latitude: 55.979798511431689
                    longitude: 14.134385999313892
                    opening_hours:
                      "2026-07-25":
                        - from: "09:00"
                          to: "12:00"
                        - from: "13:00"
                          to: "18:00"
                    tags:
                      - "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - Locations
      summary: Create a location
      description: |
        Create a location. `opening_hours` (default `{}`) is stored verbatim
        and `tags` (default `[]`) are the ids of tags to link to it. Returns the
        created location; the `Location` response header points at it.
      operationId: createLocation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationInput'
      responses:
        '201':
          description: Location created
          headers:
            Location:
              description: URL of the created location
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /locations/{id}:
    get:
      tags:
        - Locations
      summary: Get a location
      operationId: getLocation
      parameters:
        - $ref: '#/components/parameters/LocationIdPath'
      responses:
        '200':
          description: The location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags:
        - Locations
      summary: Update a location
      description: Replace all fields of a location, including its tag links.
      operationId: updateLocation
      parameters:
        - $ref: '#/components/parameters/LocationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationInput'
      responses:
        '200':
          description: The updated location
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - Locations
      summary: Delete a location
      description: Deletes the location together with its tag links.
      operationId: deleteLocation
      parameters:
        - $ref: '#/components/parameters/LocationIdPath'
      responses:
        '204':
          description: Location deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /location-tags:
    get:
      tags:
        - Locations
      summary: List location tags
      description: Retrieve all location tags, ordered by name.
      operationId: listLocationTags
      responses:
        '200':
          description: Successfully retrieved location tags
          content:
            application/json:
              schema:
                type: object
                required:
                  - location_tags
                properties:
                  location_tags:
                    type: array
                    items:
                      $ref: '#/components/schemas/LocationTag'
              example:
                location_tags:
                  - id: "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"
                    name: "Service"
                    name_en: "Service"
                    icon_name: "tabler-info-circle"
                    icon_variant: "outline"
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - Locations
      summary: Create a location tag
      operationId: createLocationTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationTagInput'
      responses:
        '201':
          description: Location tag created
          headers:
            Location:
              description: URL of the created location tag
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationTag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'

  /location-tags/{id}:
    get:
      tags:
        - Locations
      summary: Get a location tag
      operationId: getLocationTag
      parameters:
        - $ref: '#/components/parameters/LocationTagIdPath'
      responses:
        '200':
          description: The location tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationTag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    put:
      tags:
        - Locations
      summary: Update a location tag
      operationId: updateLocationTag
      parameters:
        - $ref: '#/components/parameters/LocationTagIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationTagInput'
      responses:
        '200':
          description: The updated location tag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationTag'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - Locations
      summary: Delete a location tag
      description: Deletes the tag and unlinks it from any locations.
      operationId: deleteLocationTag
      parameters:
        - $ref: '#/components/parameters/LocationTagIdPath'
      responses:
        '204':
          description: Location tag deleted
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  schemas:
    Activity:
      type: object
      description: Represents a booking activity
      required:
        - id
        - title
        - description
        - start_time
        - end_time
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the activity
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        title:
          type: string
          description: Title of the activity
          example: "Campfire Songs"
        description:
          type: string
          description: Detailed description of the activity
          example: "An evening of classic scout songs around the campfire with marshmallows."
        max_attendees:
          type: integer
          nullable: true
          description: Maximum number of attendees (null for unlimited)
          example: 50
        start_time:
          type: integer
          format: int64
          description: Start time as Unix timestamp in seconds
          example: 1752350400
        end_time:
          type: integer
          format: int64
          description: End time as Unix timestamp in seconds
          example: 1752357600

    ActivitySummary:
      type: object
      description: Slim activity for list views (omits description)
      required:
        - id
        - title
        - start_time
        - end_time
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the activity
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        title:
          type: string
          description: Title of the activity
          example: "Campfire Songs"
        max_attendees:
          type: integer
          nullable: true
          description: Maximum number of attendees (null for unlimited)
          example: 50
        start_time:
          type: integer
          format: int64
          description: Start time as Unix timestamp in seconds
          example: 1752350400
        end_time:
          type: integer
          format: int64
          description: End time as Unix timestamp in seconds
          example: 1752357600

    ActivitySpots:
      type: object
      description: Booked-spot count for a single activity
      required:
        - activity_id
        - spots_booked
      properties:
        activity_id:
          type: string
          format: uuid
          description: Activity the count belongs to
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        spots_booked:
          type: integer
          minimum: 0
          description: Summed participant_count of all bookings for the activity
          example: 12

    ActivityStatusEntry:
      type: object
      description: |
        The authenticated user's status for one activity. `status` is either
        `booked` (with the embedded `booking`) or `favourited`.
      required:
        - activity_id
        - status
      properties:
        activity_id:
          type: string
          format: uuid
          description: ID of the activity this status refers to
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        status:
          type: string
          enum:
            - booked
            - favourited
          description: The user's relationship to the activity
          example: "booked"
        booking:
          allOf:
            - $ref: '#/components/schemas/Booking'
          description: The user's booking. Present only when status is `booked`.

    Booking:
      type: object
      description: Represents a booking for an activity
      required:
        - id
        - user_id
        - activity_id
        - booker_group_id
        - booker_group_name
        - group_free_text
        - responsible_name
        - phone_number
        - participant_count
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the booking
          example: "dd000001-0000-4000-8000-000000000001"
        user_id:
          type: string
          format: uuid
          description: ID of the user who created the booking
          example: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
        activity_id:
          type: string
          format: uuid
          description: ID of the activity being booked
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"
        booker_group_id:
          type: integer
          description: Booker's scout group ID (from Scoutnet via JWT, currently dummy value)
          example: 101
        booker_group_name:
          type: string
          description: Booker's scout group name (from Scoutnet via JWT, currently dummy value)
          example: "Sjöscoutkåren Dansen"
        group_free_text:
          type: string
          description: Free text for group/patrol identification
          example: "Patrull Örnarna"
        responsible_name:
          type: string
          description: Name of the responsible adult
          example: "Anna Svensson"
        phone_number:
          type: string
          description: Phone number of the responsible adult
          example: "+46701234567"
        participant_count:
          type: integer
          description: Number of participants
          example: 12

    Favourite:
      type: object
      description: Represents a favourite (interest) for an activity
      required:
        - id
        - user_id
        - activity_id
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the favourite
          example: "ff000001-0000-4000-8000-000000000001"
        user_id:
          type: string
          format: uuid
          description: ID of the user who favourited the activity
          example: "a1b2c3d4-e5f6-4a90-abcd-ef1234567890"
        activity_id:
          type: string
          format: uuid
          description: ID of the favourited activity
          example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    Location:
      type: object
      description: A map location with its tags and opening hours
      required:
        - id
        - name
        - name_en
        - description
        - description_en
        - icon_name
        - icon_variant
        - color
        - latitude
        - longitude
        - opening_hours
        - tags
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the location
          example: "0190f3a1-1c2d-7e3f-9a4b-5c6d7e8f9a0b"
        name:
          type: string
          description: Location name (Swedish)
          example: "Infotält"
        name_en:
          type: string
          description: Location name (English)
          example: "Info tent"
        description:
          type: string
          description: Location description (Swedish)
          example: "Information och hjälp för deltagare."
        description_en:
          type: string
          description: Location description (English)
          example: "Information and help for participants."
        icon_name:
          type: string
          description: Name of the icon representing the location
          example: "tabler-badge-wc"
        icon_variant:
          type: string
          description: Icon style variant, e.g. "outline" or "filled"
          example: "outline"
        color:
          type: string
          description: Hex colour used for the location marker
          example: "#2563eb"
        latitude:
          type: number
          format: double
          description: Latitude in decimal degrees
          example: 55.979798511431689
        longitude:
          type: number
          format: double
          description: Longitude in decimal degrees
          example: 14.134385999313892
        opening_hours:
          $ref: '#/components/schemas/OpeningHours'
        tags:
          type: array
          description: Ids of the tags applied to this location
          items:
            type: string
            format: uuid
          example:
            - "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"

    OpeningHours:
      type: object
      description: |
        Opening hours keyed by ISO date (`YYYY-MM-DD`). Each date maps to the
        intervals the location is open that day; a missing date means closed.
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/TimeRange'
      example:
        "2026-07-25":
          - from: "09:00"
            to: "12:00"
          - from: "13:00"
            to: "18:00"

    TimeRange:
      type: object
      description: A single open interval within a day (HH:MM)
      required:
        - from
        - to
      properties:
        from:
          type: string
          description: Opening time (HH:MM)
          example: "09:00"
        to:
          type: string
          description: Closing time (HH:MM)
          example: "12:00"

    LocationTag:
      type: object
      description: A tag that can be applied to locations
      required:
        - id
        - name
        - name_en
        - icon_name
        - icon_variant
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the tag
          example: "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"
        name:
          type: string
          description: Tag name (Swedish)
          example: "Service"
        name_en:
          type: string
          description: Tag name (English)
          example: "Service"
        icon_name:
          type: string
          description: Name of the icon representing the tag
          example: "tabler-info-circle"
        icon_variant:
          type: string
          description: Icon style variant, e.g. "outline" or "filled"
          example: "outline"

    LocationInput:
      type: object
      description: Input for creating or updating a location
      required:
        - name
        - name_en
        - description
        - description_en
        - icon_name
        - icon_variant
        - color
        - latitude
        - longitude
      properties:
        name:
          type: string
          example: "Infotält"
        name_en:
          type: string
          example: "Info tent"
        description:
          type: string
          example: "Information och hjälp för deltagare."
        description_en:
          type: string
          example: "Information and help for participants."
        icon_name:
          type: string
          example: "tabler-badge-wc"
        icon_variant:
          type: string
          example: "filled"
        color:
          type: string
          example: "#2563eb"
        latitude:
          type: number
          format: double
          example: 55.979798511431689
        longitude:
          type: number
          format: double
          example: 14.134385999313892
        opening_hours:
          $ref: '#/components/schemas/OpeningHours'
        tags:
          type: array
          description: Ids of the tags to link to this location (default empty)
          items:
            type: string
            format: uuid
          example:
            - "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"

    LocationTagInput:
      type: object
      description: Input for creating or updating a location tag
      required:
        - name
        - name_en
        - icon_name
        - icon_variant
      properties:
        name:
          type: string
          example: "Service"
        name_en:
          type: string
          example: "Service"
        icon_name:
          type: string
          example: "tabler-info-circle"
        icon_variant:
          type: string
          example: "outline"

    BookingInput:
      type: object
      description: Input data for creating or updating a booking
      required:
        - group_free_text
        - responsible_name
        - phone_number
        - participant_count
      properties:
        group_free_text:
          type: string
          description: Free text for group/patrol identification
          example: "Patrull Örnarna"
        responsible_name:
          type: string
          description: Name of the responsible adult
          example: "Anna Svensson"
        phone_number:
          type: string
          description: Phone number of the responsible adult
          example: "+46701234567"
        participant_count:
          type: integer
          description: Number of participants
          example: 12

    ActivityInput:
      type: object
      description: Input data for creating or updating an activity
      required:
        - title
        - description
        - start_time
        - end_time
      properties:
        title:
          type: string
          description: Title of the activity
          example: "Campfire Songs"
        description:
          type: string
          description: Detailed description of the activity
          example: "An evening of classic scout songs around the campfire with marshmallows."
        max_attendees:
          type: integer
          nullable: true
          description: Maximum number of attendees (null or omit for unlimited)
          example: 50
        start_time:
          type: number
          description: Start time as Unix timestamp in seconds (accepts integer or float)
          example: 1752350400
        end_time:
          type: number
          description: End time as Unix timestamp in seconds (accepts integer or float)
          example: 1752357600

    AppConfig:
      type: object
      description: Application configuration including navigation structure
      required:
        - navigation
      properties:
        navigation:
          type: array
          description: Navigation menu structure
          items:
            $ref: '#/components/schemas/NavigationGroup'

    NavigationGroup:
      type: object
      description: A group of navigation items
      required:
        - type
        - id
        - label
        - children
      properties:
        type:
          type: string
          enum:
            - group
          description: Type identifier for navigation group
          example: "group"
        id:
          type: string
          description: Unique identifier for the group
          example: "group_booking"
        label:
          type: string
          description: Display label or i18n key for the group
          example: "booking.schedule.label"
        children:
          type: array
          description: Child navigation pages
          items:
            $ref: '#/components/schemas/NavigationPage'

    NavigationPage:
      type: object
      description: A navigation page link
      required:
        - type
        - id
        - label
        - icon
        - path
      properties:
        type:
          type: string
          enum:
            - page
          description: Type identifier for navigation page
          example: "page"
        id:
          type: string
          description: Unique identifier for the page
          example: "page_all_activities"
        label:
          type: string
          description: Display label or i18n key for the page
          example: "booking.all_activities.label"
        icon:
          type: string
          description: Icon name for the page entry
          example: "campfire"
        path:
          type: string
          description: URL path for the page (relative to the host application)
          example: "../activities"

  parameters:
    ActivityId:
      name: id
      in: path
      required: true
      description: Unique identifier of the activity
      schema:
        type: string
        format: uuid
      example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    ActivityIdPath:
      name: activity_id
      in: path
      required: true
      description: Unique identifier of the activity
      schema:
        type: string
        format: uuid
      example: "6f5e1d46-5f58-4e23-9a9d-8c2bfc2d22a0"

    BookingId:
      name: id
      in: path
      required: true
      description: Unique identifier of the booking
      schema:
        type: string
        format: uuid
      example: "dd000001-0000-4000-8000-000000000001"

    LocationIdPath:
      name: id
      in: path
      required: true
      description: Unique identifier of the location
      schema:
        type: string
        format: uuid
      example: "0190f3a1-1c2d-7e3f-9a4b-5c6d7e8f9a0b"

    LocationTagIdPath:
      name: id
      in: path
      required: true
      description: Unique identifier of the location tag
      schema:
        type: string
        format: uuid
      example: "0190f3a1-2d3e-7f40-ab51-6c7d8e9f0a1b"

    SortParam:
      name: sort
      in: query
      required: false
      description: |
        Sort field for results. Always ascending.
        Available fields: title, start_time. Defaults to title.
      schema:
        type: string
        enum:
          - title
          - start_time
      example: "start_time"

    PageParam:
      name: page
      in: query
      required: false
      description: Page number for pagination (0-indexed). Page size is 20.
      schema:
        type: integer
        minimum: 0
        default: 0
      example: 0

  responses:
    BadRequest:
      description: Bad request - invalid parameters or request body
      content:
        text/plain:
          schema:
            type: string
          example: "Bad request: Invalid activity ID format"

    NotFound:
      description: Resource not found
      content:
        text/plain:
          schema:
            type: string
          example: "Not found"

    ServerError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string
          example: "Internal server error"
